<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary System - SalahTeam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .custom-gradient { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; }
            .glass-card { border: none !important; box-shadow: none !important; background: white !important; }
            .print-container { width: 100%; max-width: 100%; margin: 0; padding: 20px; }
            table { width: 100% !important; border-collapse: collapse; }
            th, td { border: 1px solid #e2e8f0; padding: 8px; text-align: right; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <header class="custom-gradient text-white p-6 no-print shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black flex items-center gap-3">
                <i data-lucide="layout-dashboard"></i>
                Salary & Attendance Management System
            </h1>
            <div class="flex gap-3 no-print">
                <button onclick="backupDatabase()" class="bg-green-600/10 hover:bg-green-600 border border-green-600/50 px-4 py-2 rounded-xl text-xs font-bold transition-all text-green-600 hover:text-white flex items-center gap-2">
                    <i data-lucide="download" size="14"></i> نسخة احتياطية
                </button>
                <button onclick="restoreDatabase()" class="bg-orange-600/10 hover:bg-orange-600 border border-orange-600/50 px-4 py-2 rounded-xl text-xs font-bold transition-all text-orange-600 hover:text-white flex items-center gap-2">
                    <i data-lucide="upload" size="14"></i> استعادة نسخة
                </button>
                <button onclick="window.clearAllData()" class="bg-red-500/10 hover:bg-red-500 border border-red-500/50 px-4 py-2 rounded-xl text-xs font-bold transition-all text-red-500 hover:text-white">مسح البيانات</button>
                <button onclick="window.toggleModal('addEmployeeModal')" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2">
                    <i data-lucide="user-plus" size="18"></i> إضافة موظف
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <!-- Dashboard Overview -->
        <div id="dashboardHeader" class="mb-8 no-print">
            <h2 class="text-xl font-black text-slate-800 flex items-center gap-2 mb-4">
                <i data-lucide="bar-chart-3"></i> نظرة عامة
            </h2>
            <div id="statsRow" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- Employee Grid -->
        <div id="employeeListSection" class="no-print">
            <div id="employeeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Employee Profile (Dynamic) -->
        <div id="employeeProfileSection" class="hidden">
            <button onclick="window.showDashboard()" class="mb-6 text-blue-600 hover:text-blue-800 flex items-center gap-2 font-black no-print">
                <i data-lucide="arrow-right"></i> العودة للرئيسية
            </button>
            <div id="profileContent"></div>
        </div>
    </main>

    <!-- Modal: Add Employee -->
    <div id="addEmployeeModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="glass-card bg-white rounded-3xl w-full max-w-lg p-8">
            <h3 class="text-xl font-black mb-6">تعريف كادر جديد</h3>
            <form id="addEmployeeForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold mb-1">اسم الموظف الكامل</label>
                    <input type="text" name="name" required class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1">الرقم الوظيفي</label>
                    <input type="text" name="empId" required class="w-full p-3 bg-gray-50 border rounded-xl">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1">رمز الدخول (PIN) *</label>
                    <input type="number" name="pin" min="1000" max="999999" required 
                           class="w-full p-3 bg-blue-50 border border-blue-200 rounded-xl" 
                           placeholder="4-6 أرقام">
                    <p class="text-[10px] text-gray-500 mt-1">سيستخدمه الموظف لتسجيل الدخول</p>
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1">القسم</label>
                    <input type="text" name="department" required class="w-full p-3 bg-gray-50 border rounded-xl">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1">تاريخ بدء العمل</label>
                    <input type="date" name="startDate" required class="w-full p-3 bg-blue-50 border border-blue-200 rounded-xl font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1">الراتب الأساسي ($)</label>
                    <input type="number" name="salary" required class="w-full p-3 bg-gray-50 border rounded-xl">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold mb-1">ساعات الدوام اليومية</label>
                    <input type="number" name="dailyHours" value="7" required class="w-full p-3 bg-gray-50 border rounded-xl">
                </div>
                <div class="md:col-span-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="allowRemote" class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-xs font-bold">✅ السماح بالعمل عن بُعد (من أي مكان)</span>
                    </label>
                    <p class="text-[10px] text-gray-500 mt-1 mr-6">إذا تم التحديد، يمكن لهذا الموظف تسجيل الدخول من خارج المكتب</p>
                </div>
                                <button type="submit" class="md:col-span-2 bg-slate-900 text-white py-4 rounded-2xl font-black mt-4">حفظ بيانات الموظف</button>
                <button type="button" onclick="window.toggleModal('addEmployeeModal')" class="md:col-span-2 text-gray-400 font-bold text-sm">إلغاء</button>
            </form>
        </div>
    </div>

    <!-- Modal: Attendance Entry -->
    <div id="attendanceModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4">
        <div class="glass-card bg-white rounded-3xl w-full max-w-md p-8">
            <h3 class="text-xl font-black mb-6">تسجيل حضور وانصراف</h3>
            <form id="attendanceForm" class="space-y-4">
                <input type="hidden" name="targetEmpId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold mb-1 text-gray-500">التاريخ</label>
                        <input type="date" name="date" required class="w-full p-3 bg-gray-50 border rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-gray-500">ساعات اليوم</label>
                        <input type="number" name="reqHrs" step="0.1" required class="w-full p-3 bg-blue-50 border rounded-xl font-bold">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold mb-1 text-gray-500">وقت الدخول</label>
                        <input type="time" name="checkIn" required class="w-full p-3 bg-gray-50 border rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-gray-500">وقت الخروج</label>
                        <input type="time" name="checkOut" required class="w-full p-3 bg-gray-50 border rounded-xl">
                    </div>
                </div>
                <div class="p-4 bg-slate-50 rounded-xl space-y-2 border border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase">نوع العملية</p>
                    <label class="flex items-center gap-2 text-sm font-bold cursor-pointer"><input type="radio" name="pType" value="normal" checked> خصم عادي (1:60 للتأخير)</label>
                    <label class="flex items-center gap-2 text-sm font-bold cursor-pointer"><input type="radio" name="pType" value="paid"> مشروع مدفوع (لا خصم)</label>
                    <label class="flex items-center gap-2 text-sm font-bold cursor-pointer"><input type="radio" name="pType" value="volunteer"> تطوعي (1:1 للخصم)</label>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">حفظ السجل</button>
                <button type="button" onclick="window.toggleModal('attendanceModal')" class="w-full text-gray-400 font-bold text-sm">إلغاء</button>
            </form>
        </div>
    </div>

    <!-- Modal: Payment Entry -->
    <div id="paymentModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4">
        <div class="glass-card bg-white rounded-3xl w-full max-w-md p-8">
            <h3 class="text-xl font-black mb-6">صرف دفعة نقدية</h3>
            <form id="paymentForm" class="space-y-4">
                <input type="hidden" name="paymentEmpId">
                <div>
                    <label class="block text-xs font-bold mb-1 text-gray-500">تاريخ الصرف</label>
                    <input type="date" name="date" required class="w-full p-4 bg-gray-50 border rounded-2xl">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-gray-500">المبلغ ($)</label>
                    <input type="number" name="amount" step="0.01" required class="w-full p-4 bg-green-50 border border-green-200 text-green-700 font-black text-xl rounded-2xl">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-gray-500">البيان</label>
                    <input type="text" name="note" placeholder="مثال: دفعة تحت الحساب" class="w-full p-4 bg-gray-50 border rounded-2xl">
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black">تأكيد الصرف</button>
            </form>
        </div>
    </div>

    <script>
        // ✅ إعداد رابط الخادم - Render URL
        const RENDER_URL = 'https://salary-app-server.onrender.com';
        
        const DB_KEY = 'SALAH_ERP_V6_FINAL';
        let db = { employees: [], attendance: {}, payments: {} };
        let activeEmployeeId = null;
        let dateFilter = { start: '', end: '' };

        const save = async () => {
            try {
                const response = await fetch(`${RENDER_URL}/api/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(db)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error('فشل السيرفر في الحفظ: ' + errorText);
                }

                const result = await response.json();
                console.log('نجاح:', result);
                render(); 
            } catch (error) {
                console.error('خطأ فني:', error);
                alert('لم يتم الحفظ! تأكد من اتصال الإنترنت وأن الخادم يعمل على Render.');
            }
        };

        const loadData = async () => {
            try {
                const response = await fetch(`${RENDER_URL}/api/data`);
                const savedData = await response.json();
                if (savedData && savedData.employees) {
                    db = savedData;
                    render();
                }
            } catch (error) {
                console.error('خطأ في جلب البيانات:', error);
            }
        };
        
        window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');
        window.showDashboard = () => {
            document.getElementById('employeeListSection').classList.remove('hidden');
            document.getElementById('dashboardHeader').classList.remove('hidden');
            document.getElementById('employeeProfileSection').classList.add('hidden');
        };

        // وظيفة عمل نسخة احتياطية - معدلة للويب
        async function backupDatabase() {
            try {
                const response = await fetch(`${RENDER_URL}/api/backup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetPath: 'backup.db' })
                });
                const result = await response.json();
                if (result.success) {
                    alert('✅ تم بدء عملية النسخ الاحتياطي');
                } else {
                    alert('❌ فشل النسخ: ' + result.error);
                }
            } catch (error) {
                alert('خطأ في الاتصال بالسيرفر');
            }
        }

        // دالة الاستعادة - معدلة للويب
        async function restoreDatabase() {
            if (!confirm('تحذير: الاستعادة ستؤدي لاستبدال البيانات الحالية. هل أنت متأكد؟')) return;
            try {
                const response = await fetch(`${RENDER_URL}/api/restore`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ selectedFilePath: 'restore.db' })
                });
                const result = await response.json();
                if (result.success) {
                    alert('✅ تمت استعادة البيانات بنجاح! سيتم الآن تحديث الصفحة.');
                    location.reload();
                } else {
                    alert('❌ فشل في عملية الاستعادة: ' + result.error);
                }
            } catch (error) {
                console.error("Restore Error:", error);
                alert('حدث خطأ أثناء الاتصال بالسيرفر');
            }
        }

        function calculate(emp, logs, pays, filter = { start: '', end: '' }) {
            const filteredLogs = logs.filter(log => {
                if (!filter.start || !filter.end) return true;
                return log.date >= filter.start && log.date <= filter.end;
            });
            const filteredPays = pays.filter(p => {
                if (!filter.start || !filter.end) return true;
                return p.date >= filter.start && p.date <= filter.end;
            });

            const today = new Date();
            const startD = filter.start ? new Date(filter.start) : new Date(emp.startDate);
            const endD = filter.end ? new Date(filter.end) : today;
            
            const diffTime = Math.max(0, endD - startD);
            const daysInRange = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            const cappedDays = Math.min(30, daysInRange);
            
            const earnedSalary = (emp.salary / 30) * cappedDays;
            const hourlyRate = (emp.salary / 30) / emp.dailyHours;
            const minRate = hourlyRate / 60;
            
            let totalDeduction = 0;
            let totalWorkMins = 0;
            let totalDelayMins = 0;

            const processedLogs = filteredLogs.map(log => {
                const [hIn, mIn] = log.checkIn.split(':').map(Number);
                const [hOut, mOut] = log.checkOut.split(':').map(Number);
                const timeIn = hIn * 60 + mIn;
                const timeOut = hOut * 60 + mOut;
                const workMins = timeOut - timeIn;
                const reqMins = parseFloat(log.reqHrs) * 60;
                
                totalWorkMins += workMins;

                let ded = 0;
                let status = "مكتمل";
                let delayMinutes = 0;
                let shortfallMinutes = 0;

                if (log.pType !== 'paid') {
                    const limit = 11 * 60;
                    if (timeIn > limit) {
                        delayMinutes = timeIn - limit;
                        totalDelayMins += delayMinutes;
                        if (log.pType === 'normal' && delayMinutes < 60) {
                            ded += (delayMinutes * 60) * minRate;
                            status = "تأخير مضاعف";
                        } else {
                            ded += delayMinutes * minRate;
                            status = "تأخير عادي";
                        }
                    }
                    const shortfall = reqMins - workMins;
                    if (shortfall > 0) {
                        shortfallMinutes = shortfall;
                        ded += shortfall * minRate;
                        status = status === "مكتمل" ? "نقص ساعات" : status + " + نقص";
                    }
                } else {
                    status = "مشروع مدفوع";
                }
                totalDeduction += ded;
                return { 
                    ...log, 
                    workHrs: (workMins/60).toFixed(2), 
                    delayMins: delayMinutes, 
                    shortfallMins: shortfallMinutes,
                    ded: ded.toFixed(2), 
                    status 
                };
            }).sort((a,b) => new Date(b.date) - new Date(a.date));

            const totalPaid = filteredPays.reduce((sum, p) => sum + parseFloat(p.amount), 0);
            const netSalary = earnedSalary - totalDeduction;
            const remaining = netSalary - totalPaid;

            return {
                earnedSalary: earnedSalary.toFixed(2),
                totalDeduction: totalDeduction.toFixed(2),
                totalPaid: totalPaid.toFixed(2),
                netSalary: netSalary.toFixed(2),
                remaining: remaining.toFixed(2),
                summary: {
                    totalHours: (totalWorkMins / 60).toFixed(1),
                    totalDelay: (totalDelayMins / 60).toFixed(1),
                    workDays: filteredLogs.length
                },
                processedLogs,
                payments: filteredPays.sort((a,b) => new Date(b.date) - new Date(a.date))
            };
        }

        function render() {
            const grid = document.getElementById('employeeGrid');
            const stats = document.getElementById('statsRow');
            let grandRemaining = 0;

            grid.innerHTML = db.employees.map(emp => {
                const results = calculate(emp, db.attendance[emp.id] || [], db.payments[emp.id] || []);
                grandRemaining += parseFloat(results.remaining);
                return `
                    <div class="glass-card p-6 rounded-3xl cursor-pointer hover:border-blue-500 transition-all border-r-4 border-slate-900" onclick="viewProfile('${emp.id}')">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-black text-lg text-slate-800">${emp.name}</h3>
                            <span class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded-lg">${emp.empId}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-xs mb-4">
                            <span class="text-gray-400 font-bold">المتبقي له:</span> <span class="text-green-600 font-black">$${results.remaining}</span>
                            <span class="text-gray-400 font-bold">أيام العمل:</span> <span class="text-slate-700 font-black">${results.processedLogs.length}</span>
                        </div>
                        <div class="pt-4 border-t flex justify-end items-center gap-2 text-xs font-bold text-blue-600">فتح الملف <i data-lucide="chevron-left" size="14"></i></div>
                    </div>
                `;
            }).join('');

            stats.innerHTML = `
                <div class="glass-card p-6 rounded-3xl">
                    <p class="text-[10px] font-black text-gray-400 uppercase">إجمالي الموظفين</p>
                    <h4 class="text-2xl font-black text-slate-800">${db.employees.length}</h4>
                </div>
                <div class="glass-card p-6 rounded-3xl border-t-4 border-green-500">
                    <p class="text-[10px] font-black text-gray-400 uppercase">إجمالي الالتزامات المالية</p>
                    <h4 class="text-2xl font-black text-green-600">$${grandRemaining.toFixed(2)}</h4>
                </div>
            `;
            lucide.createIcons();
        }

        window.updateDateFilter = (start, end) => {
            dateFilter = { start, end };
            viewProfile(activeEmployeeId);
        };

        window.viewProfile = (id) => {
            activeEmployeeId = id;
            const emp = db.employees.find(e => e.id === id);
            const logs = db.attendance[id] || [];
            const pays = db.payments[id] || [];
            const results = calculate(emp, logs, pays, dateFilter);

            document.getElementById('employeeListSection').classList.add('hidden');
            document.getElementById('dashboardHeader').classList.add('hidden');
            document.getElementById('employeeProfileSection').classList.remove('hidden');

            document.getElementById('profileContent').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <div id="printStatement" class="print-only w-full p-10 bg-white">
                        <div class="flex justify-between items-start border-b-4 border-slate-900 pb-6 mb-8">
                            <div>
                                <h1 class="text-4xl font-black">Lenantco LCR</h1>
                                <p class="text-sm font-bold text-gray-500 tracking-widest">كشف حساب مالي - Financial Statement</p>
                            </div>
                            <div class="text-left text-sm font-bold">
                                <p>الفترة: ${dateFilter.start || 'البداية'} - ${dateFilter.end || 'اليوم'}</p>
                                <p>رقم الموظف: ${emp.empId}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-10 mb-8">
                            <div class="space-y-2">
                                <h4 class="text-xs font-black text-blue-600 border-b pb-1">معلومات الموظف</h4>
                                <p class="text-lg font-black">${emp.name}</p>
                                <p class="text-sm text-gray-500">${emp.department}</p>
                            </div>
                            <div class="space-y-2">
                                <h4 class="text-xs font-black text-blue-600 border-b pb-1">ملخص الدوام</h4>
                                <p class="text-sm">ساعات العمل: <b>${results.summary.totalHours} س</b></p>
                                <p class="text-sm text-red-600">إجمالي التأخير: <b>${results.summary.totalDelay} س</b></p>
                            </div>
                        </div>
                        <div class="bg-slate-900 text-white p-6 rounded-2xl flex justify-between items-center mb-8">
                            <div><p class="text-[10px] font-bold opacity-60">الرصيد المتبقي المستحق</p><h2 class="text-4xl font-black">$${results.remaining}</h2></div>
                            <div class="text-right"><p class="text-[10px] opacity-60">إجمالي الخصومات</p><h2 class="text-xl font-bold">-$${results.totalDeduction}</h2></div>
                        </div>
                        <h4 class="font-black mb-4">تفاصيل الدفعات المالية المسلمة</h4>
                        <table class="w-full text-sm">
                            <thead class="bg-gray-100"><tr><th class="p-2">التاريخ</th><th class="p-2">البيان</th><th class="p-2">المبلغ</th></tr></thead>
                            <tbody>${results.payments.map(p => `<tr><td class="p-2">${p.date}</td><td class="p-2">${p.note || '-'}</td><td class="p-2 font-black">$${p.amount}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>

                    <div id="printAttendance" class="print-only w-full p-10 bg-white" style="page-break-before: always;">
                        <div class="flex justify-between items-start border-b-4 border-slate-900 pb-6 mb-8">
                            <div><h1 class="text-4xl font-black">Lenantco LCR</h1><p class="text-sm font-bold text-gray-500">سجل الدوام التفصيلي - Attendance Log</p></div>
                            <div class="text-left text-sm font-bold"><p>${emp.name}</p><p>${dateFilter.start || '...'} إلى ${dateFilter.end || '...'}</p></div>
                        </div>
                        <table class="w-full text-xs">
                            <thead class="bg-slate-50"><tr><th>التاريخ</th><th>الدخول</th><th>الخروج</th><th>الساعات</th><th>التأخير</th><th>الخصم</th><th>الحالة</th></tr></thead>
                            <tbody>${results.processedLogs.map(l => `<tr><td>${l.date}</td><td>${l.checkIn}</td><td>${l.checkOut}</td><td>${l.workHrs}</td><td>${l.delayMins} د</td><td>$${l.ded}</td><td>${l.status}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>

                    <div class="lg:col-span-1 space-y-4 no-print">
                        <div class="glass-card p-6 rounded-3xl border-t-8 border-slate-900">
                            <h2 class="text-2xl font-black text-slate-800">${emp.name}</h2>
                            <p class="text-sm font-bold text-blue-600 mb-6">${emp.department}</p>
                            
                            <div class="p-3 bg-blue-50 rounded-2xl mb-4 border border-blue-100">
                                <label class="block text-[10px] font-black text-blue-400 mb-2 uppercase">تصفية حسب التاريخ</label>
                                <div class="grid grid-cols-1 gap-2">
                                    <input type="date" value="${dateFilter.start}" onchange="updateDateFilter(this.value, dateFilter.end)" class="text-xs p-2 rounded-lg border">
                                    <input type="date" value="${dateFilter.end}" onchange="updateDateFilter(dateFilter.start, this.value)" class="text-xs p-2 rounded-lg border">
                                </div>
                            </div>

                            <div class="space-y-3 text-xs border-t pt-4">
                                <div class="flex justify-between"><span>ساعات العمل:</span><b>${results.summary.totalHours} س</b></div>
                                <div class="flex justify-between text-red-500"><span>إجمالي التأخير:</span><b>${results.summary.totalDelay} س</b></div>
                                <div class="flex justify-between p-2 bg-green-50 rounded-lg mt-2 border border-green-200">
                                    <span class="text-green-700 font-bold">المتبقي الصافي:</span>
                                    <b class="text-green-800 text-lg">$${results.remaining}</b>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex flex-col gap-2">
                            <button onclick="window.openPayment('${emp.id}')" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 shadow-lg">
                                <i data-lucide="wallet" size="18"></i> صرف دفعة جديدة
                            </button>
                            <button onclick="window.print()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 shadow-lg">
                                <i data-lucide="printer" size="18"></i> طباعة كشف الحساب
                            </button>
                        </div>

                        <div class="glass-card p-4 rounded-3xl">
                            <h4 class="text-xs font-black text-slate-400 uppercase mb-4 flex items-center gap-2"><i data-lucide="history" size="14"></i> سجل الدفعات</h4>
                            <div class="max-h-64 overflow-y-auto space-y-2">
                                ${results.payments.map(p => `
                                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100">
                                        <div><p class="text-[10px] font-black">${p.date}</p><p class="text-[9px] text-gray-400">${p.note || 'دفعة نقدية'}</p></div>
                                        <div class="flex items-center gap-3"><b class="text-green-600 text-sm">$${p.amount}</b><button onclick="delPay('${emp.id}', '${p.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="x" size="12"></i></button></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-3 no-print">
                        <div class="glass-card rounded-3xl overflow-hidden">
                            <div class="p-6 border-b flex justify-between items-center bg-white/50">
                                <h3 class="font-black text-slate-800 flex items-center gap-2"><i data-lucide="clock" class="text-blue-600"></i> سجل الدوام والتأخير</h3>
                                <div class="flex gap-2">
                                    <button onclick="window.print()" class="bg-slate-100 text-slate-700 px-4 py-2 rounded-xl text-xs font-black">طباعة سجل الدوام</button>
                                    <button onclick="window.openAtt('${emp.id}', ${emp.dailyHours})" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-black">+ إضافة دوام</button>
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-right text-sm">
                                    <thead>
                                        <tr class="bg-gray-50 border-b text-[10px] text-gray-400 font-black uppercase">
                                            <th class="p-4">التاريخ</th>
                                            <th class="p-4 text-center">الدوام</th>
                                            <th class="p-4 text-center">التأخير / النقص</th>
                                            <th class="p-4 text-center">الحالة</th>
                                            <th class="p-4 text-left">الخصم</th>
                                            <th class="p-4"></th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y">
                                        ${results.processedLogs.map(log => `
                                            <tr class="hover:bg-slate-50 transition-colors">
                                                <td class="p-4 font-bold text-slate-700">${log.date}</td>
                                                <td class="p-4 text-center text-xs">
                                                    <span class="bg-slate-100 px-2 py-1 rounded font-bold">${log.checkIn} - ${log.checkOut}</span>
                                                    <div class="text-[10px] text-gray-400 mt-1">${log.workHrs} س</div>
                                                </td>
                                                <td class="p-4 text-center">
                                                    <div class="flex flex-col gap-1 items-center">
                                                        ${log.delayMins > 0 ? `<span class="text-[10px] font-bold text-orange-600 bg-orange-50 px-2 rounded-full border border-orange-100">تأخير: ${log.delayMins} د</span>` : ''}
                                                        ${log.shortfallMins > 0 ? `<span class="text-[10px] font-bold text-red-600 bg-red-50 px-2 rounded-full border border-red-100">نقص: ${log.shortfallMins} د</span>` : ''}
                                                    </div>
                                                </td>
                                                <td class="p-4 text-center"><span class="px-2 py-1 rounded-full text-[10px] font-black ${parseFloat(log.ded) > 0 ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}">${log.status}</span></td>
                                                <td class="p-4 text-left font-black text-red-600">$${log.ded}</td>
                                                <td class="p-4 text-left"><button onclick="delLog('${emp.id}', '${log.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button></td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        };

        window.openAtt = (id, h) => {
            const f = document.getElementById('attendanceForm');
            f.targetEmpId.value = id;
            f.reqHrs.value = h;
            f.date.valueAsDate = new Date();
            f.checkIn.value = "11:00";
            f.checkOut.value = "18:00";
            window.toggleModal('attendanceModal');
        };

        window.openPayment = (id) => {
            const f = document.getElementById('paymentForm');
            f.paymentEmpId.value = id;
            f.date.valueAsDate = new Date();
            window.toggleModal('paymentModal');
        };

        document.getElementById('addEmployeeForm').onsubmit = (e) => {
            e.preventDefault();
            const d = Object.fromEntries(new FormData(e.target).entries());
            d.id = Date.now().toString();
            // تحويل PIN إلى رقم
            if (d.pin) d.pin = parseInt(d.pin);
            db.employees.push(d);
            save();
            e.target.reset();
            window.toggleModal('addEmployeeModal');
        };

        document.getElementById('attendanceForm').onsubmit = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const id = fd.get('targetEmpId');
            if(!db.attendance[id]) db.attendance[id] = [];
            db.attendance[id].push({
                id: Date.now().toString(),
                date: fd.get('date'),
                reqHrs: fd.get('reqHrs'),
                checkIn: fd.get('checkIn'),
                checkOut: fd.get('checkOut'),
                pType: fd.get('pType')
            });
            save();
            window.toggleModal('attendanceModal');
            window.viewProfile(id);
        };

        document.getElementById('paymentForm').onsubmit = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const id = fd.get('paymentEmpId');
            if(!db.payments[id]) db.payments[id] = [];
            db.payments[id].push({
                id: Date.now().toString(),
                date: fd.get('date'),
                amount: fd.get('amount'),
                note: fd.get('note')
            });
            save();
            window.toggleModal('paymentModal');
            window.viewProfile(id);
        };

        window.delLog = (eid, lid) => { if(confirm('حذف السجل؟')) { db.attendance[eid] = db.attendance[eid].filter(l => l.id !== lid); save(); window.viewProfile(eid); }};
        window.delPay = (eid, pid) => { if(confirm('حذف الدفعة؟')) { db.payments[eid] = db.payments[eid].filter(p => p.id !== pid); save(); window.viewProfile(eid); }};
        window.clearAllData = () => { 
            if(confirm('هل أنت متأكد من حذف جميع البيانات نهائياً؟')) { 
                db = { employees: [], attendance: {}, payments: {} }; 
                save();
            }
        };

        window.onload = async () => {
            await loadData();
            lucide.createIcons();
        };
    </script>
</body>
</html>
